<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Nexore Systems</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 50px;
}

/* LOGO TEXT */
.logo {
    font-size: 40px;
    letter-spacing: 8px;
    line-height: 1.5;
}

/* GRADIENT CIRCLE */
.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: linear-gradient(135deg, orange, pink);
}

/* LINE */
.line {
    height: 1px;
    background: gray;
    margin: 40px 50px;
}

/* CONTENT */
.content {
    padding: 50px;
    max-width: 800px;
}

h1 {
    font-size: 50px;
}

p {
    color: #ccc;
    font-size: 18px;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(135deg, orange, pink);
    border: none;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
}
</style>

</head>
<body>

<div class="header">
    <div class="logo">
        NEXORE<br>SYSTEMS
    </div>

    <div class="circle"></div>
</div>

<div class="line"></div>

<div class="content">
    <h1>Future Digital Systems</h1>
    <p>
        Ми створюємо сучасні рішення, автоматизацію та цифрові продукти.
    </p>

    <button onclick="alert('Звʼязок скоро 🚀')">
        Зв’язатися
    </button>
</div>

</body>
</html>
